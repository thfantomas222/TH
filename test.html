<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Switcher with Flags</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
      
    <div>
        <button class="flag-button" data-language="sk">
            <img src="https://flagcdn.com/sk.svg" alt="Slovak">
        </button>
        <button class="flag-button" data-language="en">
            <img src="https://flagcdn.com/gb.svg" alt="English">
        </button>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
